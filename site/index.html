<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7ec8e3">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<title>Count &amp; Play</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family: "Comic Sans MS", "Chalkboard SE", "Segoe UI", sans-serif;
    background: linear-gradient(180deg, #aee7ff 0%, #e8f9ff 60%, #d4f5d4 100%);
    display:flex; flex-direction:column;
    touch-action: manipulation;
  }

  /* ---------- header ---------- */
  #header {
    display:flex; justify-content:space-between; align-items:center;
    padding: 8px 14px; min-height:50px; gap:10px;
  }
  #stars { font-size: clamp(16px, 3.5vmin, 26px); letter-spacing:2px; min-height:1em; flex:1; text-align:center; }
  .iconBtn {
    font-size: clamp(20px, 4.5vmin, 32px); background:rgba(255,255,255,.7);
    border:none; border-radius:50%; width:1.9em; height:1.9em; cursor:pointer;
  }

  /* ---------- equation ---------- */
  #equation {
    text-align:center; font-size: clamp(28px, 7vmin, 60px); font-weight:bold;
    color:#2a5d8f; min-height:1.3em; letter-spacing:3px;
  }
  #equation .q { color:#e67e22; }
  #equation .ghostNum { color:#b8cfe0; }

  /* ---------- stage ---------- */
  #stage {
    flex:1; display:flex; align-items:stretch; justify-content:center;
    padding: 6px 10px; gap:8px; min-height:0;
  }
  .zone {
    border-radius: 22px; padding: 8px;
    display:flex; flex-wrap:wrap; align-content:center; justify-content:center;
    gap: 1.6vmin; transition: all .3s;
    overflow:hidden; position:relative;
  }
  #plateA {
    flex: 1;
    background: rgba(255,255,255,.55);
    border: 4px dashed #8ecae6;
  }
  #plateB {
    flex: 1;
    background: rgba(255,255,255,.55);
    border: 4px dashed #f4a261;
    display:none;
  }
  #plateB.visible { display:flex; }
  #goneZone {
    flex: 0 0 30%;
    background: rgba(200,200,200,.25);
    border: 4px dashed #bbb;
    display:none;
    align-content:center;
  }
  #goneZone.visible { display:flex; }
  .zoneLabel {
    width:100%; text-align:center; font-size:clamp(13px,2.5vmin,20px); color:#999;
  }

  /* item sizing tiers: fewer items = bigger fruit */
  .zone.szBig .item, .zone.szBig .slot { font-size: clamp(36px, 9vmin, 80px); }
  .zone.szMid .item, .zone.szMid .slot { font-size: clamp(26px, 6.5vmin, 56px); }
  .zone.szSmall .item, .zone.szSmall .slot { font-size: clamp(20px, 4.8vmin, 40px); }

  .item {
    line-height:1; position:relative;
    transition: transform .25s, opacity .4s, filter .4s;
    animation: dropIn .5s ease-out;
  }
  .item.tappable { cursor:pointer; }
  .item.ghost { opacity:.35; filter:grayscale(1); transform:scale(.85); }
  .item.pulse { animation: pulse .5s ease-in-out; }
  .item.groupPulse { animation: pulse .8s ease-in-out; }
  @keyframes dropIn {
    0% { transform: translateY(-70px) scale(.3); opacity:0; }
    70% { transform: translateY(6px) scale(1.1); opacity:1; }
    100% { transform: translateY(0) scale(1); }
  }
  @keyframes pulse {
    0%,100% { transform:scale(1); }
    50% { transform:scale(1.4); }
  }
  .countBubble {
    position:absolute; top:-0.6em; left:50%; transform:translateX(-50%);
    background:#ffb703; color:#fff; font-weight:bold;
    font-size:.5em; padding:.12em .4em; border-radius:1em;
    animation: bubblePop .4s ease-out;
    pointer-events:none; z-index:2;
  }
  @keyframes bubblePop {
    0% { transform:translateX(-50%) scale(0); }
    70% { transform:translateX(-50%) scale(1.3); }
    100% { transform:translateX(-50%) scale(1); }
  }

  /* take-away slots */
  #slots { display:flex; flex-wrap:wrap; justify-content:center; gap:1.2vmin; width:100%; }
  .slot {
    width:1.25em; height:1.25em; border-radius:50%;
    border: 3px dashed #e07a5f; background:rgba(255,255,255,.5);
    display:flex; align-items:center; justify-content:center;
    line-height:1;
  }
  .slot .item { animation:none; }

  /* ---------- picker ---------- */
  #picker {
    flex:1; display:none; flex-direction:column; align-items:center;
    gap: 2.5vmin; padding: 6px 10px; min-height:0;
    overflow-y:auto;
  }
  /* safe centering: centers when there is room, but never spills upward
     over the equation; if content is ever too tall, the picker scrolls */
  #picker::before, #picker::after { content:""; margin:auto; }
  #picker.visible { display:flex; }
  #pickerTitle { font-size:clamp(20px,4.5vmin,34px); color:#444; text-align:center; }
  #numGrid {
    display:grid; grid-template-columns: repeat(5, 1fr); gap: 1.8vmin;
    width:min(92vw, 560px);   /* fitGrid() overrides with an exact fit at runtime */
  }
  .numBtn {
    font-family:inherit; font-weight:bold; border:none; cursor:pointer;
    font-size: clamp(20px, 5vmin, 40px);
    aspect-ratio: 1; border-radius: 20px;
    background:#fff; color:#2a5d8f; box-shadow: 0 4px 0 #c9dce8;
  }
  .numBtn:active { transform:translateY(3px); box-shadow:0 1px 0 #c9dce8; }
  .numBtn:disabled { opacity:.25; pointer-events:none; }
  #opRow { display:none; gap:6vmin; }
  #opRow.visible { display:flex; }
  .opBtn {
    font-family:inherit; font-weight:bold; border:none; cursor:pointer;
    font-size: clamp(40px, 11vmin, 80px);
    width: clamp(90px, 22vmin, 150px); height: clamp(90px, 22vmin, 150px);
    border-radius: 30px; color:#fff;
  }
  .opBtn:disabled { opacity:.25; pointer-events:none; }
  #plusBtn { background:#7ddf7d; box-shadow:0 6px 0 #56b856; }
  #plusBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #56b856; }
  #minusBtn { background:#f4a261; box-shadow:0 6px 0 #d07f3f; }
  #minusBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #d07f3f; }
  #diceBtn {
    font-family:inherit; font-weight:bold; border:none; cursor:pointer;
    font-size:clamp(18px,4vmin,30px); padding:.5em 1em; border-radius:40px;
    background:#c8a2ff; color:#fff; box-shadow:0 5px 0 #a276e0;
    display:none;
  }
  #diceBtn.visible { display:block; }
  #diceBtn:active { transform:translateY(3px); box-shadow:0 2px 0 #a276e0; }

  /* ---------- prompt line ---------- */
  #prompt {
    text-align:center; font-size: clamp(17px, 4vmin, 30px);
    color:#444; min-height:1.5em; padding: 0 10px;
  }

  /* ---------- bottom bar ---------- */
  #bottomBar {
    display:flex; justify-content:center; align-items:center; gap: 4vmin;
    padding: 10px 10px calc(16px + env(safe-area-inset-bottom));
    min-height: clamp(96px, 22vmin, 160px);
  }

  /* quiz answer buttons */
  .ansBtn {
    font-family: inherit;
    font-size: clamp(32px, 9vmin, 64px); font-weight:bold;
    width: clamp(78px, 19vmin, 132px); height: clamp(78px, 19vmin, 132px);
    border-radius: 26px; border: none; cursor:pointer;
    background:#fff; color:#2a5d8f;
    box-shadow: 0 6px 0 #c9dce8;
    transition: transform .1s;
    display:none;
  }
  .ansBtn.ready { display:block; animation: dropIn .4s ease-out; }
  .ansBtn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c9dce8; }
  .ansBtn.correct { background:#7ddf7d; color:#fff; box-shadow:0 6px 0 #56b856; }
  .ansBtn.wrong { animation: shake .45s; background:#ffd6d6; }
  .ansBtn.dim { opacity:.4; pointer-events:none; }
  @keyframes shake {
    0%,100% { transform:translateX(0); }
    20%,60% { transform:translateX(-10px); }
    40%,80% { transform:translateX(10px); }
  }

  /* learn action buttons */
  .actionBtn {
    font-family:inherit; font-weight:bold; cursor:pointer; border:none;
    font-size: clamp(22px, 5.5vmin, 40px);
    padding: .5em 1em; border-radius: 26px; color:#fff;
    display:none;
  }
  .actionBtn.show { display:block; animation: dropIn .4s ease-out; }
  #mergeBtn { background:#7ddf7d; box-shadow:0 6px 0 #56b856; }
  #mergeBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #56b856; }
  #againBtn { background:#8ab6f9; box-shadow:0 6px 0 #5a8fe0; }
  #againBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #5a8fe0; }
  #newBtn { background:#c8a2ff; box-shadow:0 6px 0 #a276e0; }
  #newBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #a276e0; }

  /* ---------- overlays ---------- */
  .overlay {
    position:fixed; inset:0; background: linear-gradient(180deg,#7ec8e3,#a8e6cf);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:20px; z-index:10; text-align:center; padding:20px;
  }
  .overlay h1 { color:#fff; font-size:clamp(32px,9vmin,66px); text-shadow:0 3px 0 rgba(0,0,0,.15); }
  .overlay .fruits { font-size:clamp(38px,10vmin,76px); }
  .bigBtn {
    font-family:inherit; font-size:clamp(22px,6vmin,42px); font-weight:bold;
    padding:.5em 1.2em; border:none; border-radius:60px; cursor:pointer;
    color:#fff; min-width: 7em;
  }
  #playBtn { background:#ffb703; box-shadow:0 8px 0 #d99502; }
  #playBtn:active { transform:translateY(5px); box-shadow:0 3px 0 #d99502; }
  #learnModeBtn { background:#7ddf7d; box-shadow:0 8px 0 #56b856; }
  #learnModeBtn:active { transform:translateY(5px); box-shadow:0 3px 0 #56b856; }
  #quizModeBtn { background:#8ab6f9; box-shadow:0 8px 0 #5a8fe0; }
  #quizModeBtn:active { transform:translateY(5px); box-shadow:0 3px 0 #5a8fe0; }
  .modeSub { color:#fff; font-size:clamp(13px,3vmin,19px); margin-top:-12px; opacity:.9; }
  #menuOverlay { display:none; }

  /* ---------- confetti ---------- */
  .confetti {
    position:fixed; top:-20px; font-size:24px; z-index:20;
    animation: fall linear forwards; pointer-events:none;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  /* while the picker is on screen, the prompt and bottom bar are empty —
     collapse them so the picker gets the full height (no scrollbar) */
  body.picking #prompt { display:none; }
  body.picking #bottomBar { min-height:0; height:0; padding:0; overflow:hidden; }

  /* portrait phones */
  @media (orientation: portrait) {
    #stage { flex-direction:column; }
    #goneZone { flex: 0 0 30%; }
  }
</style>
</head>
<body>

<!-- first-tap overlay (unlocks audio) -->
<div class="overlay" id="startOverlay">
  <div class="fruits">🍎 🍊 🥭</div>
  <h1>Count &amp; Play</h1>
  <button class="bigBtn" id="playBtn">▶ Play</button>
</div>

<!-- mode menu -->
<div class="overlay" id="menuOverlay">
  <div class="fruits">🍎 🍊 🥭</div>
  <h1>Count &amp; Play</h1>
  <button class="bigBtn" id="learnModeBtn">🧺 Learn</button>
  <div class="modeSub">pick numbers, watch and do</div>
  <button class="bigBtn" id="quizModeBtn">⭐ Quiz</button>
  <div class="modeSub">watch, count, answer</div>
</div>

<div id="header">
  <button class="iconBtn" id="homeBtn" title="Menu">🏠</button>
  <div id="stars"></div>
  <button class="iconBtn" id="soundBtn" title="Sound on/off">🔊</button>
</div>

<div id="equation"></div>

<!-- number/op picker (learn mode) -->
<div id="picker">
  <div id="pickerTitle"></div>
  <div id="numGrid"></div>
  <div id="opRow">
    <button class="opBtn" id="plusBtn">+</button>
    <button class="opBtn" id="minusBtn">−</button>
  </div>
  <button id="diceBtn">🎲 Surprise me!</button>
</div>

<!-- play stage -->
<div id="stage">
  <div class="zone szBig" id="plateA"></div>
  <div class="zone szBig" id="plateB"></div>
  <div class="zone szBig" id="goneZone">
    <div class="zoneLabel" id="goneLabel">take away</div>
    <div id="slots"></div>
  </div>
</div>

<div id="prompt"></div>

<div id="bottomBar">
  <button class="ansBtn"></button>
  <button class="ansBtn"></button>
  <button class="ansBtn"></button>
  <button class="actionBtn" id="mergeBtn">🧺 Put together!</button>
  <button class="actionBtn" id="againBtn">🔁 Again</button>
  <button class="actionBtn" id="newBtn">🎲 New numbers</button>
</div>

<script>
(function () {
  "use strict";

  var ITEMS = ["🍎","🍊","🥭","🍌","🍓","⭐","🎈","⚽","🚗"];
  var NAMES = { "🍎":"apples","🍊":"oranges","🥭":"mangoes","🍌":"bananas","🍓":"strawberries","⭐":"stars","🎈":"balloons","⚽":"balls","🚗":"cars" };
  var NUM_WORDS = ["zero","one","two","three","four","five","six","seven","eight","nine","ten",
                   "eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen","twenty"];
  var MAX_N = 20;

  var plateA = document.getElementById("plateA");
  var plateB = document.getElementById("plateB");
  var goneZone = document.getElementById("goneZone");
  var goneLabel = document.getElementById("goneLabel");
  var slotsEl = document.getElementById("slots");
  var stage = document.getElementById("stage");
  var picker = document.getElementById("picker");
  var pickerTitle = document.getElementById("pickerTitle");
  var numGrid = document.getElementById("numGrid");
  var opRow = document.getElementById("opRow");
  var plusBtn = document.getElementById("plusBtn");
  var minusBtn = document.getElementById("minusBtn");
  var diceBtn = document.getElementById("diceBtn");
  var equationEl = document.getElementById("equation");
  var promptEl = document.getElementById("prompt");
  var starsEl = document.getElementById("stars");
  var ansBtns = Array.prototype.slice.call(document.querySelectorAll(".ansBtn"));
  var mergeBtn = document.getElementById("mergeBtn");
  var againBtn = document.getElementById("againBtn");
  var newBtn = document.getElementById("newBtn");
  var soundBtn = document.getElementById("soundBtn");
  var homeBtn = document.getElementById("homeBtn");
  var startOverlay = document.getElementById("startOverlay");
  var menuOverlay = document.getElementById("menuOverlay");
  var playBtn = document.getElementById("playBtn");
  var learnModeBtn = document.getElementById("learnModeBtn");
  var quizModeBtn = document.getElementById("quizModeBtn");

  var soundOn = true;
  var mode = null;              /* "learn" | "quiz" */
  var busy = false;
  var session = 0;              /* bumped on every mode switch to cancel stale async loops */

  /* learn state */
  var L = { a: 0, op: "+", b: 0 };

  /* quiz state */
  var correctCount = 0;
  var round = 0;
  var currentAnswer = null;
  var currentProblem = null;

  /* ---------- helpers ---------- */
  function sleep(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }
  function rand(n) { return Math.floor(Math.random() * n); }
  function plural(name, n) { return n === 1 ? name.replace(/s$/, "") : name; }
  function word(n) { return NUM_WORDS[n]; }

  /* ---------- speech ---------- */
  var speechOK = ("speechSynthesis" in window) && ("SpeechSynthesisUtterance" in window);

  function speak(text) {
    return new Promise(function (resolve) {
      if (!soundOn || !speechOK) { setTimeout(resolve, 350); return; }
      try {
        var u = new SpeechSynthesisUtterance(text);
        u.lang = "en-US";
        u.rate = 0.85;
        u.pitch = 1.15;
        var done = false;
        var finish = function () { if (!done) { done = true; resolve(); } };
        u.onend = finish;
        u.onerror = finish;
        setTimeout(finish, Math.max(1600, text.length * 130)); /* some browsers never fire onend */
        window.speechSynthesis.speak(u);
      } catch (e) { resolve(); }
    });
  }

  soundBtn.addEventListener("click", function () {
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? "🔊" : "🔇";
    if (!soundOn && speechOK) window.speechSynthesis.cancel();
  });

  /* ---------- visuals ---------- */
  function sizeClassFor(n) { return n <= 6 ? "szBig" : (n <= 12 ? "szMid" : "szSmall"); }
  function applySize(zone, n) {
    zone.classList.remove("szBig", "szMid", "szSmall");
    zone.classList.add(sizeClassFor(n));
  }

  function addItemEl(emoji, zone) {
    var el = document.createElement("div");
    el.className = "item";
    el.textContent = emoji;
    zone.appendChild(el);
    return el;
  }

  function bubble(el, n) {
    var b = document.createElement("div");
    b.className = "countBubble";
    b.textContent = n;
    el.appendChild(b);
    setTimeout(function () { if (b.parentNode) b.parentNode.removeChild(b); }, 1400);
  }

  async function countItem(el, n) {
    el.classList.add("pulse");
    bubble(el, n);
    await speak(word(n));
    el.classList.remove("pulse");
    await sleep(100);
  }

  function setEquation(html) { equationEl.innerHTML = html; }
  function eqFull(a, op, b, result) {
    var res = (result === null || result === undefined)
      ? '<span class="q">?</span>' : String(result);
    setEquation(a + " " + op + " " + b + " = " + res);
  }

  function clearStage() {
    plateA.querySelectorAll(".item").forEach(function (e) { e.remove(); });
    plateB.querySelectorAll(".item").forEach(function (e) { e.remove(); });
    goneZone.querySelectorAll(".item").forEach(function (e) { e.remove(); });
    slotsEl.innerHTML = "";
    plateB.classList.remove("visible");
    goneZone.classList.remove("visible");
    promptEl.textContent = "";
  }

  function updateStars() {
    var shown = Math.min(correctCount, 10);
    var s = "";
    for (var i = 0; i < shown; i++) s += "⭐";
    starsEl.textContent = s;
  }

  function confettiBurst() {
    var pieces = ["🎉","⭐","🌟","✨","🎈"];
    for (var i = 0; i < 18; i++) {
      var c = document.createElement("div");
      c.className = "confetti";
      c.textContent = pieces[rand(pieces.length)];
      c.style.left = rand(100) + "vw";
      c.style.animationDuration = (1.4 + Math.random() * 1.4) + "s";
      c.style.animationDelay = (Math.random() * 0.4) + "s";
      document.body.appendChild(c);
      (function (node) {
        setTimeout(function () { if (node.parentNode) node.parentNode.removeChild(node); }, 3500);
      })(c);
    }
  }

  function hideActionBtns() {
    mergeBtn.classList.remove("show");
    againBtn.classList.remove("show");
    newBtn.classList.remove("show");
  }

  /* ============================================================
     LEARN MODE
     Step 1: pick first number (1–20)
     Step 2: pick + or −
     Step 3: pick second number (valid range only)
     Then the problem is acted out with two colored groups.
     ============================================================ */

  /* size the grid so title + 4 rows + dice button always fit the
     picker height with square buttons — no scrollbar, no overlap */
  function fitGrid() {
    if (!picker.classList.contains("visible")) return;
    if (numGrid.style.display === "none") return;
    numGrid.style.width = "";
    var vmin = Math.min(window.innerWidth, window.innerHeight);
    var gap = 0.018 * vmin;        /* #numGrid gap: 1.8vmin */
    var pgap = 0.025 * vmin;       /* #picker gap: 2.5vmin */
    var free = picker.clientHeight - 12;   /* vertical padding */
    var gaps = 3;                  /* ::before|title|grid|::after */
    free -= pickerTitle.offsetHeight;
    if (diceBtn.classList.contains("visible")) { free -= diceBtn.offsetHeight; gaps++; }
    free -= gaps * pgap + 8;       /* small safety margin */
    var s = Math.min((free - 3 * gap) / 4,
                     (Math.min(0.92 * window.innerWidth, 560) - 4 * gap) / 5);
    s = Math.max(30, s);
    numGrid.style.width = (5 * s + 4 * gap) + "px";
  }
  window.addEventListener("resize", fitGrid);

  function showPicker() {
    clearStage();
    hideActionBtns();
    document.body.classList.add("picking");
    stage.style.display = "none";
    picker.classList.add("visible");
    diceBtn.classList.add("visible");
    opRow.classList.remove("visible");
    numGrid.style.display = "grid";
    pickerTitle.textContent = "Pick a number!";
    setEquation('<span class="ghostNum">?</span>');
    buildGrid(1, MAX_N, onPickFirst);
    fitGrid();
    speak("Pick a number!");
  }

  function buildGrid(min, max, handler, enabledMax) {
    numGrid.innerHTML = "";
    for (var n = min; n <= max; n++) {
      (function (num) {
        var b = document.createElement("button");
        b.className = "numBtn";
        b.textContent = num;
        if (enabledMax !== undefined && num > enabledMax) b.disabled = true;
        b.addEventListener("click", function () { handler(num); });
        numGrid.appendChild(b);
      })(n);
    }
  }

  function onPickFirst(n) {
    L.a = n;
    speak(word(n));
    setEquation(String(n));
    /* step 2: operation */
    numGrid.style.display = "none";
    diceBtn.classList.remove("visible");
    opRow.classList.add("visible");
    plusBtn.disabled = (n >= MAX_N);         /* 20 + anything exceeds the cap */
    minusBtn.disabled = (n < 1);
    pickerTitle.textContent = "Plus or take away?";
  }

  function onPickOp(op) {
    L.op = op;
    speak(op === "+" ? "plus" : "take away");
    setEquation(L.a + " " + op + ' <span class="ghostNum">?</span>');
    opRow.classList.remove("visible");
    numGrid.style.display = "grid";
    pickerTitle.textContent = "Pick another number!";
    if (op === "+") {
      buildGrid(1, MAX_N, onPickSecond, MAX_N - L.a);   /* keep sum ≤ 20 */
    } else {
      buildGrid(1, MAX_N, onPickSecond, L.a);           /* no negatives */
    }
    fitGrid();
  }

  function onPickSecond(n) {
    L.b = n;
    speak(word(n));
    startActing();
  }

  function diceRoll() {
    var op = rand(2) === 0 ? "+" : "−";
    if (op === "+") {
      L.a = 1 + rand(MAX_N - 1);                 /* 1..19 */
      L.b = 1 + rand(MAX_N - L.a);               /* sum ≤ 20 */
    } else {
      L.a = 2 + rand(MAX_N - 1);                 /* 2..20 */
      L.b = 1 + rand(L.a);                       /* 1..a */
    }
    L.op = op;
    startActing();
  }

  function startActing() {
    document.body.classList.remove("picking");
    picker.classList.remove("visible");
    diceBtn.classList.remove("visible");
    stage.style.display = "flex";
    if (L.op === "+") actAdd(session); else actSub(session);
  }

  /* ----- addition: two colored groups join into one ----- */
  async function actAdd(mySession) {
    busy = true;
    clearStage();
    hideActionBtns();
    var a = L.a, b = L.b, sum = a + b;
    var iA = rand(ITEMS.length);
    var iB = (iA + 1 + rand(ITEMS.length - 1)) % ITEMS.length;  /* always different */
    var emA = ITEMS[iA], emB = ITEMS[iB];
    var nameA = NAMES[emA], nameB = NAMES[emB];

    setEquation(a + ' + <span class="ghostNum">' + b + '</span> = <span class="q">?</span>');
    plateB.classList.add("visible");
    applySize(plateA, a);
    applySize(plateB, b);

    promptEl.textContent = word(a) + " " + plural(nameA, a) + "!";
    await speak(word(a) + " " + plural(nameA, a) + "!");
    for (var i = 1; i <= a; i++) {
      if (session !== mySession) return;
      var el = addItemEl(emA, plateA);
      el.dataset.group = "A";
      await countItem(el, i);
    }

    await sleep(400);
    if (session !== mySession) return;
    setEquation(a + " + " + b + ' = <span class="q">?</span>');
    promptEl.textContent = "and " + word(b) + " " + plural(nameB, b) + "!";
    await speak("and " + word(b) + " " + plural(nameB, b) + "!");
    for (var j = 1; j <= b; j++) {
      if (session !== mySession) return;
      var el2 = addItemEl(emB, plateB);
      el2.dataset.group = "B";
      await countItem(el2, j);
    }

    await sleep(300);
    if (session !== mySession) return;
    promptEl.textContent = "Tap to put them together!";
    await speak(word(a) + " " + plural(nameA, a) + " and " + word(b) + " " + plural(nameB, b) + ". Tap, put together!");
    if (session !== mySession) return;
    mergeBtn.classList.add("show");
    busy = false;
  }

  async function doMerge(mySession) {
    busy = true;
    mergeBtn.classList.remove("show");
    var a = L.a, b = L.b, sum = a + b;

    /* move group B items into plate A */
    applySize(plateA, sum);
    var bItems = Array.prototype.slice.call(plateB.querySelectorAll(".item"));
    for (var i = 0; i < bItems.length; i++) {
      if (session !== mySession) return;
      var el = bItems[i];
      el.remove();
      plateA.appendChild(el);
      await sleep(90);
    }
    plateB.classList.remove("visible");
    promptEl.textContent = "All together now!";
    await speak("All together now! Let's count on!");
    if (session !== mySession) return;

    /* counting on: pulse the whole first group and say its number ... */
    var aItems = plateA.querySelectorAll('.item[data-group="A"]');
    aItems.forEach(function (e) { e.classList.add("groupPulse"); });
    if (aItems.length > 0) bubble(aItems[aItems.length - 1], a);
    await speak(word(a) + "!");
    aItems.forEach(function (e) { e.classList.remove("groupPulse"); });
    if (session !== mySession) return;

    /* ... then count on over the second group: a+1, a+2, ... */
    var bMoved = plateA.querySelectorAll('.item[data-group="B"]');
    for (var k = 0; k < bMoved.length; k++) {
      if (session !== mySession) return;
      await countItem(bMoved[k], a + 1 + k);
    }

    if (session !== mySession) return;
    eqFull(a, "+", b, sum);
    promptEl.textContent = word(a) + " plus " + word(b) + " makes " + word(sum) + "!";
    confettiBurst();
    await speak(word(a) + " plus " + word(b) + " makes " + word(sum) + "!");
    if (session !== mySession) return;
    againBtn.classList.add("show");
    newBtn.classList.add("show");
    busy = false;
  }

  /* ----- subtraction: fill the take-away slots ----- */
  var slotsFilled = 0;

  async function actSub(mySession) {
    busy = true;
    clearStage();
    hideActionBtns();
    var a = L.a, b = L.b;
    var em = ITEMS[rand(ITEMS.length)];
    var name = NAMES[em];

    setEquation(a + ' − <span class="ghostNum">' + b + '</span> = <span class="q">?</span>');
    applySize(plateA, a);
    applySize(goneZone, b);

    promptEl.textContent = word(a) + " " + plural(name, a) + "!";
    await speak(word(a) + " " + plural(name, a) + "!");
    for (var i = 1; i <= a; i++) {
      if (session !== mySession) return;
      var el = addItemEl(em, plateA);
      await countItem(el, i);
    }

    await sleep(400);
    if (session !== mySession) return;
    setEquation(a + " − " + b + ' = <span class="q">?</span>');
    goneLabel.textContent = "take away " + b;
    goneZone.classList.add("visible");
    slotsEl.innerHTML = "";
    slotsFilled = 0;
    for (var s = 0; s < b; s++) {
      var slot = document.createElement("div");
      slot.className = "slot";
      slotsEl.appendChild(slot);
    }
    promptEl.textContent = "Take away " + b + "! Tap the " + name + "!";
    await speak("Now take away " + word(b) + "! Tap " + word(b) + " " + plural(name, b) + "!");
    if (session !== mySession) return;

    /* make fruits tappable */
    plateA.querySelectorAll(".item").forEach(function (it) {
      it.classList.add("tappable");
      it.addEventListener("click", function () { onFruitTap(it, mySession); });
    });
    busy = false;
  }

  async function onFruitTap(el, mySession) {
    if (mode !== "learn" || session !== mySession || busy) return;
    if (slotsFilled >= L.b || !el.classList.contains("tappable")) return;
    busy = true;
    el.classList.remove("tappable");
    var slot = slotsEl.children[slotsFilled];
    el.remove();
    slot.appendChild(el);
    slotsFilled++;
    bubble(el, slotsFilled);
    await speak(word(slotsFilled));
    if (session !== mySession) return;

    if (slotsFilled >= L.b) {
      /* all taken away */
      plateA.querySelectorAll(".item").forEach(function (e) { e.classList.remove("tappable"); });
      promptEl.textContent = "We took away " + L.b + "!";
      await speak("We took away " + word(L.b) + "!");
      if (session !== mySession) return;
      slotsEl.querySelectorAll(".item").forEach(function (e) { e.classList.add("ghost"); });
      await sleep(400);

      /* count what's left */
      var left = plateA.querySelectorAll(".item");
      promptEl.textContent = "How many are left?";
      await speak("How many are left? Let's count!");
      for (var i = 0; i < left.length; i++) {
        if (session !== mySession) return;
        await countItem(left[i], i + 1);
      }
      if (session !== mySession) return;
      var result = L.a - L.b;
      eqFull(L.a, "−", L.b, result);
      if (result === 0) {
        promptEl.textContent = "Zero! All gone!";
        confettiBurst();
        await speak("Zero! All gone! " + word(L.a) + " take away " + word(L.b) + " leaves zero!");
      } else {
        promptEl.textContent = word(L.a) + " take away " + word(L.b) + " leaves " + word(result) + "!";
        confettiBurst();
        await speak(word(L.a) + " take away " + word(L.b) + " leaves " + word(result) + "!");
      }
      if (session !== mySession) return;
      againBtn.classList.add("show");
      newBtn.classList.add("show");
      busy = false;
    } else {
      busy = false;
    }
  }

  mergeBtn.addEventListener("click", function () {
    if (mode !== "learn" || busy) return;
    doMerge(session);
  });
  againBtn.addEventListener("click", function () {
    if (mode !== "learn" || busy) return;
    hideActionBtns();
    startActing();
  });
  newBtn.addEventListener("click", function () {
    if (mode !== "learn" || busy) return;
    showPicker();
  });
  plusBtn.addEventListener("click", function () { onPickOp("+"); });
  minusBtn.addEventListener("click", function () { onPickOp("−"); });
  diceBtn.addEventListener("click", diceRoll);

  /* ============================================================
     QUIZ MODE — watch, count, answer
     ============================================================ */

  function hideAnswers() {
    ansBtns.forEach(function (b) {
      b.classList.remove("ready", "correct", "wrong", "dim");
      b.textContent = "";
    });
  }

  function showAnswers(correct, maxN) {
    var opts = [correct];
    var candidates = [];
    for (var v = 0; v <= maxN; v++) if (v !== correct) candidates.push(v);
    candidates.sort(function (x, y) {
      return (Math.abs(x - correct) - Math.abs(y - correct)) || (Math.random() - 0.5);
    });
    opts.push(candidates[0], candidates[1]);
    for (var i = opts.length - 1; i > 0; i--) {
      var j = rand(i + 1);
      var t = opts[i]; opts[i] = opts[j]; opts[j] = t;
    }
    ansBtns.forEach(function (b, k) {
      b.textContent = opts[k];
      b.classList.add("ready");
    });
  }

  function makeProblem() {
    var max = correctCount >= 5 ? 10 : 5;   /* level up after 5 stars */
    var isAdd = (round % 2 === 0);          /* alternate + and − */
    if (isAdd) {
      var total = 2 + rand(max - 1);
      var a = 1 + rand(total - 1);
      return { op: "+", a: a, b: total - a, answer: total };
    } else {
      var n = 2 + rand(max - 1);
      var k = 1 + rand(n - 1);
      return { op: "−", a: n, b: k, answer: n - k };
    }
  }

  async function playRound(mySession) {
    busy = true;
    hideAnswers();
    clearStage();
    equationEl.innerHTML = "";

    var p = makeProblem();
    currentProblem = p;
    currentAnswer = p.answer;
    var emoji = ITEMS[rand(ITEMS.length)];
    var name = NAMES[emoji] || "things";
    applySize(plateA, p.op === "+" ? p.a + p.b : p.a);
    applySize(goneZone, p.b);

    await sleep(400);
    if (session !== mySession) return;

    if (p.op === "+") {
      eqFull(p.a, "+", p.b, null);
      promptEl.textContent = "Watch the " + name + "!";
      await speak(word(p.a) + " " + plural(name, p.a));
      for (var i = 1; i <= p.a; i++) {
        if (session !== mySession) return;
        var el = addItemEl(emoji, plateA);
        await countItem(el, i);
      }
      await sleep(500);
      if (session !== mySession) return;
      promptEl.textContent = p.b + " more!";
      await speak(word(p.b) + " more " + plural(name, p.b) + " coming!");
      for (var j = p.a + 1; j <= p.a + p.b; j++) {
        if (session !== mySession) return;
        var el2 = addItemEl(emoji, plateA);
        await countItem(el2, j);
      }
      await sleep(400);
      promptEl.textContent = "How many altogether?";
      await speak("How many " + name + " altogether?");
    } else {
      eqFull(p.a, "−", p.b, null);
      promptEl.textContent = "Watch the " + name + "!";
      await speak(word(p.a) + " " + plural(name, p.a));
      for (var m = 1; m <= p.a; m++) {
        if (session !== mySession) return;
        var el3 = addItemEl(emoji, plateA);
        await countItem(el3, m);
      }
      await sleep(600);
      if (session !== mySession) return;
      goneLabel.textContent = "went away";
      goneZone.classList.add("visible");
      promptEl.textContent = p.b + " go away!";
      await speak(word(p.b) + " " + (p.b === 1 ? "goes" : "go") + " away!");
      var homeItems = plateA.querySelectorAll(".item");
      for (var g = 0; g < p.b; g++) {
        if (session !== mySession) return;
        var mover = homeItems[homeItems.length - 1 - g];
        mover.remove();
        var ghost = addItemEl(emoji, goneZone);
        ghost.classList.add("ghost");
        await speak(word(g + 1));
        await sleep(150);
      }
      await sleep(400);
      promptEl.textContent = "How many are left?";
      await speak("How many " + name + " are left?");
    }

    if (session !== mySession) return;
    showAnswers(p.answer, 10);
    busy = false;
  }

  async function recountTogether(mySession) {
    var p = currentProblem;
    promptEl.textContent = "Let's count together!";
    await speak("Let's count together!");
    var items = plateA.querySelectorAll(".item");
    for (var i = 0; i < items.length; i++) {
      if (session !== mySession) return;
      await countItem(items[i], i + 1);
    }
    if (session !== mySession) return;
    if (p.op === "+") {
      promptEl.textContent = "How many altogether?";
      await speak(word(items.length) + "! How many altogether?");
    } else {
      promptEl.textContent = "How many are left?";
      await speak(word(items.length) + "! How many are left?");
    }
  }

  ansBtns.forEach(function (btn) {
    btn.addEventListener("click", async function () {
      if (mode !== "quiz" || busy || !btn.classList.contains("ready")) return;
      var mySession = session;
      var val = parseInt(btn.textContent, 10);
      if (val === currentAnswer) {
        busy = true;
        ansBtns.forEach(function (b) { if (b !== btn) b.classList.add("dim"); });
        btn.classList.add("correct");
        var p = currentProblem;
        eqFull(p.a, p.op, p.b, p.answer);
        confettiBurst();
        correctCount++;
        updateStars();
        var praise = ["Yes! ", "Great job! ", "Well done! ", "Hooray! "][rand(4)];
        await speak(praise + word(currentAnswer) + "!");
        await sleep(900);
        if (session !== mySession) return;
        round++;
        playRound(mySession);
      } else {
        busy = true;
        btn.classList.add("wrong");
        await speak("Hmm, let's try counting!");
        btn.classList.remove("wrong");
        await recountTogether(mySession);
        if (session !== mySession) return;
        busy = false;
      }
    });
  });

  /* ============================================================
     MODE SWITCHING
     ============================================================ */

  function resetUI() {
    session++;
    busy = false;
    if (speechOK) window.speechSynthesis.cancel();
    hideAnswers();
    hideActionBtns();
    clearStage();
    equationEl.innerHTML = "";
    picker.classList.remove("visible");
    diceBtn.classList.remove("visible");
    document.body.classList.remove("picking");
    stage.style.display = "flex";
    starsEl.textContent = "";
  }

  function showMenu() {
    resetUI();
    mode = null;
    menuOverlay.style.display = "flex";
  }

  function enterLearn() {
    resetUI();
    menuOverlay.style.display = "none";
    mode = "learn";
    showPicker();
  }

  function enterQuiz() {
    resetUI();
    menuOverlay.style.display = "none";
    mode = "quiz";
    updateStars();
    round = 0;
    playRound(session);
  }

  homeBtn.addEventListener("click", showMenu);
  learnModeBtn.addEventListener("click", enterLearn);
  quizModeBtn.addEventListener("click", enterQuiz);

  playBtn.addEventListener("click", function () {
    startOverlay.style.display = "none";
    /* unlock speech on iOS with a silent utterance */
    if (speechOK) {
      try {
        var u = new SpeechSynthesisUtterance(" ");
        u.volume = 0;
        window.speechSynthesis.speak(u);
      } catch (e) {}
    }
    showMenu();
  });

})();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js");
  });
}
</script>
