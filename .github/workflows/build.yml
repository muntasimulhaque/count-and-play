name: Build signed Android release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::KEYSTORE_BASE64 secret not set — building unsigned."
          else
            echo "$KEYSTORE_BASE64" | base64 -d > app/signing.keystore
          fi

      - name: Build release AAB and APK
        env:
          KEYSTORE_FILE: signing.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle :app:bundleRelease :app:assembleRelease

      - name: Verify signing certificate
        run: |
          if [ -f app/signing.keystore ]; then
            keytool -printcert -jarfile app/build/outputs/bundle/release/app-release.aab | grep -A2 "SHA256" || true
          fi

      - name: Upload AAB (for Play Console)
        uses: actions/upload-artifact@v4
        with:
          name: count-and-play-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Upload APK (for direct install / testing)
        uses: actions/upload-artifact@v4
        with:
          name: count-and-play-apk
          path: app/build/outputs/apk/release/app-release*.apk

      - name: Publish AAB + APK to the "latest-build" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest-build --yes --cleanup-tag || true
          gh release create latest-build \
            app/build/outputs/bundle/release/app-release.aab \
            app/build/outputs/apk/release/app-release.apk \
            --title "Latest CI build" \
            --notes "Automated signed build of commit ${GITHUB_SHA}" \
            --prerelease
